  # ------------------ COGNITO -----------
  UserPoolPedidosEspeciales:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "UserPoolPedidosEspeciales-${Environment}"
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      MfaConfiguration: 'OFF'
      UsernameAttributes:
        - email
      LambdaConfig:
        PostConfirmation: !GetAtt AddUserToGroup.Arn

  UserPoolClientPedidosEspeciales:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "UserPoolClientPedidosEspeciales-${Environment}"
      UserPoolId: !Ref UserPoolPedidosEspeciales
      GenerateSecret: false

  IdentityPoolPedidosEspeciales:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "IdentityPoolPedidosEspeciales-${Environment}"
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClientPedidosEspeciales
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolPedidosEspeciales}


  UserGroupEditor:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Editor
      Description: Acceso a editar
      Precedence: 11
      UserPoolId: !Ref UserPoolPedidosEspeciales

  UserGroupAdmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      Description: Acceso total a todas las funcionalidades
      Precedence: 0
      UserPoolId: !Ref UserPoolPedidosEspeciales

  UserGroupViewer:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Viewer
      Description: Grupo por defecto para nuevos usuarios
      Precedence: 99
      UserPoolId: !Ref UserPoolPedidosEspeciales

  # ------------------ Extra infraestructure -----------


  #Crear el trigger para que al momento de crear un usuario lo meta al grupo Default
  AddUserToGroup:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "AddUserToGroupPE-${Environment}"
      CodeUri: ./Endpoints/Users/AddUserToGroup/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Environment:
        Variables:
          DEFAULT_GROUP: Viewer
       
  PermissionForAddUserToGroup:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AddUserToGroup
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolPedidosEspeciales}

