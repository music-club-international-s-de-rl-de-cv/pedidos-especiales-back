AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  stock-price

Globals:
  Function:
    Timeout: 3
    LoggingConfig:
      LogFormat: JSON

# Variables de entorno globales
Parameters:
  Environment:
    Type: String
    Default: develop
  # ENV FOR DATABASE
  DBUri:
    Type: String
  DBName:
    Type: String
  CollectionResponse:
    Type: String
  CollectionOrders:
    Type: String
  CollectionRecords:
    Type: String
  CollectionWebhook:
    Type: String


  # ENV FOR LIVERPOOL-EPICOR
  DevEnv:
    Type: String
  ApiKeyDevEpicor:
    Type: String
  AuthDevEpicor:
    Type: String
  UriDevEpicor:
    Type: String
  ApiKeyProdEpicor:
    Type: String
  UriProdEpicor:
    Type: String
  AuthGetDescSp:
    Type: String
  
  ## ENV FOR SQL
  SqlServer:
    Type: String
  SqlUser:
    Type: String
  SqlPass:
    Type: String
  SqlDb:
    Type: String
  SqlDbPrueba:
    Type: String


 
Resources:
  # ------------------ Roles ----------- 
  LambdaExecutionRoleS3:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "LambdaExecutionRoleS3PE-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "InvokeLambdaPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "lambda:InvokeFunction"  # Permite invocar la Lambda `ReadFile`
                Resource: "*"  # Permite invocar cualquier función Lambda
              - Effect: "Allow"
                Action:
                  - "logs:*"  # Permiso para escribir logs en CloudWatch
                Resource: "*"
              - Effect: "Allow"
                Action:
                  - "cloudformation:DescribeStacks"  # Permitir describir pilas de CloudFormation
                Resource: "*"  # Permitir en todos los recursos de CloudFormation
        - PolicyName: CognitoListUsersPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:ListGroups
                  - cognito-idp:GetGroup 
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:ListUsersInGroup
                  - cognito-idp:AdminCreateUser      # ← agrega
                  - cognito-idp:AdminDeleteUser      # ← agrega
                  - cognito-idp:AdminRemoveUserFromGroup  # ← agrega (para removeFromGroup)
                  - cognito-idp:AdminUpdateUserAttributes # ← agrega (por si acaso)
                Resource: "*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
  
  LambdaExecutionRoleTrigger:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "LambdaExecutionRoleTriggerPE-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "InvokeLambdaPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "lambda:InvokeFunction"  # Permite invocar la Lambda `ReadFile`
                Resource: "*"  # Permite invocar cualquier función Lambda
              - Effect: "Allow"
                Action:
                  - "logs:*"  # Permiso para escribir logs en CloudWatch
                Resource: "*"
              - Effect: "Allow"
                Action:
                  - "cloudformation:DescribeStacks"  # Permitir describir pilas de CloudFormation
                Resource: "*"  # Permitir en todos los recursos de CloudFormation
  
  CloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "CloudWatchRolePE-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: "sts:AssumeRole"
            Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"
      Policies:
        - PolicyName: ShopifyLambdaCloudWatchPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"
    
  AppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AppSyncServiceRolePE-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action: "sts:AssumeRole"
            Effect: "Allow"
            Principal:
              Service: "appsync.amazonaws.com"
      # Policies:
        # - PolicyName: "AppSyncLambdaInvokePolicy"
        #   PolicyDocument:
        #     Version: "2012-10-17"
        #     Statement:
        #       - Action:
        #           - "lambda:InvokeFunction"
        #         Effect: "Allow"
        #         Resource: !GetAtt ResolverAppsync.Arn

  # ------------------ Lambdas -----------

  # -- Api Gateway Endpoints

  OrderEpicor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "OrderEpicor-${Environment}"
      CodeUri: ./Endpoints/Epicor/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRoleTrigger.Arn   # Asignación del rol con permisos de S3
      Runtime: nodejs18.x
      Timeout: 300        # ← Agrega esto
      MemorySize: 300
      Environment:
        Variables:
          API_KEY_DEV_EPICOR:  !Ref ApiKeyDevEpicor
          AUTH_GET_DESC_SP: !Ref AuthGetDescSp
          URI_DEV_EPICOR: !Ref UriDevEpicor
          URI_PROD_EPICOR: !Ref UriProdEpicor
          ENVIRONMENT: !Ref Environment
          DEVELOP_ENV: !Ref DevEnv
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_ORDERS: !Ref CollectionOrders

  GetOrders:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetOrdersPE-${Environment}"
      CodeUri: ./Endpoints/Orders/GetOrdersPE/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_ORDERS: !Ref CollectionOrders
          ENVIRONMENT: !Ref Environment
      Events:
        GetOrders:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /getOrdersPe
            Method: GET

  CatchOrders:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "CatchOrdersPE-${Environment}"
      CodeUri: ./Endpoints/Orders/CatchOrdersPE/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Timeout: 300
      MemorySize: 300
      Events:
        CatchOrders:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /catchOrdersPe
            Method: POST
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_ORDERS: !Ref CollectionOrders
          ENVIRONMENT: !Ref Environment

  GetUsers:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetUsersPE-${Environment}"
      CodeUri: ./Endpoints/Users/GetUsers/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales
      Events:
        GetUsers:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /getUsers
            Method: GET
  
  GetUsersGroups:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetUsersGroupsPE-${Environment}"
      CodeUri: ./Endpoints/Users/GetUsersGroups/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales
      Events:
        GetUsersGroups:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /getUsersGroups
            Method: GET
  CreateUser:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "CreateUserPE-${Environment}"
      CodeUri: ./Endpoints/Users/CreateUser/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Timeout: 30
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales
      Events:
        CreateUser:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /createUser
            Method: POST

  DeleteUser:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "DeleteUserPE-${Environment}"
      CodeUri: ./Endpoints/Users/DeleteUser/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Timeout: 30
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales
      Events:
        DeleteUser:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /deleteUser
            Method: POST
  RequestPermissions:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "RequestPermissionsPE-${Environment}"
      CodeUri: ./Endpoints/Users/RequestPermissions/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Timeout: 60
      Events:
        RequestPermissions:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /requestPermissions
            Method: POST
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales

  AcceptPermissions:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "AcceptPermissionsPE-${Environment}"
      CodeUri: ./Endpoints/Users/AcceptPermissions/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn   # Asignación del rol con permisos de S3
      Runtime: python3.13
      Timeout: 60
      Events:
        AcceptPermissions:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /acceptPermissions
            Method: POST
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPoolPedidosEspeciales

  GetOneOrder: 
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetOneOrder-${Environment}"
      CodeUri: ./Endpoints/Orders/GetOneOrder/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_ORDERS: !Ref CollectionOrders
      Events:
        GetOneOrder:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /GetOneOrder
            Method: GET

  GetRecords:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetRecords-${Environment}"
      CodeUri: ./Endpoints/Orders/GetRecords/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_RECORDS: !Ref CollectionRecords
      Events:
        GetRecords:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /GetRecords
            Method: GET

  GetWebhook:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "GetWebhook-${Environment}"
      CodeUri: ./Endpoints/Orders/GetWebhook/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_WEBHOOK: !Ref CollectionWebhook
      Events:
        GetWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /GetWebhook
            Method: GET

  ReSendOrder: 
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "ReSendOrder-${Environment}"
      CodeUri: ./Endpoints/Orders/ReSendOrder/
      Handler: app.lambda_handler
      Role: !GetAtt LambdaExecutionRoleS3.Arn
      Runtime: python3.13
      Environment:
        Variables:
          MONGO_URI: !Ref DBUri
          BD_NAME: !Ref DBName
          COLLECTION_ORDERS: !Ref CollectionOrders 
          COLLECTION_WEBHOOK: !Ref CollectionWebhook
          COLLECTION_RECORDS: !Ref CollectionRecords
      Events:
        ReSendOrder:
          Type: Api
          Properties:
            RestApiId: !Ref PedidosEspecialesAPI
            Path: /ReSendOrder
            Method: POST

  # -- Apsync functions
