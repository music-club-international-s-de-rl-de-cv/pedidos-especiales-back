  #         APPSYNC_API_ID: !GetAtt WSPedidosEspecialesApi.ApiId   # Guardamos el API ID en las variables de entorno
  #         APPSYNC_API_KEY: !GetAtt WSPedidosEspecialesApiKey.ApiKey
  #         REGION: !Ref AWS::Region  # Usamos la región actual de AWS
  #         MONGO_URI: !Ref DBUri
  #         BD_NAME: !Ref DBName
  #         COLLECTION_RESPONSE: !Ref CollectionResponse


  
  # ------------------ API GATEWAY -----------
  PedidosEspecialesAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name: "PedidosEspecialesAPI"
      StageName: !Sub "${Environment}"
      Cors:
        AllowMethods: "'OPTIONS,POST,GET'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      DefinitionBody:
        swagger: "2.0"
        info:
          title: "PedidosEspecialesAPI"
          version: "1.0"
        paths:
          /getOrdersPe:
            get:
              summary: "Obtener las ordenes"
              produces:
                - "application/json"
             
              responses:
                "200":
                  description: "Detalle de procesos"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetOrders.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /getUsers:
            get:
              summary: "Obtener usuarios"
              produces:
                - "application/json"
              parameters:
                - name: "limit"
                  in: "query"
                  required: false
                  type: "integer"
                  description: "Cantidad de usuarios por página"
                - name: "page"
                  in: "query"
                  required: false
                  type: "integer"
                  description: "Cantidad de usuarios por página"
              responses:
                "200":
                  description: "Lista de productis"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUsers.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /getUsersGroups:
            get:
              summary: "Obtener grupos deusuarios"
              produces:
                - "application/json"
              parameters:
                - name: "flag"
                  in: "query"
                  required: false
                  type: "string"
                  description: "Cantidad de gurpos de usuarios"
              responses:
                "200":
                  description: "Lista de grupos"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUsersGroups.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /requestPermissions:
            post:
              summary: "Solicitar permiso a los usuarios Admin"
              consumes:
                - "multipart/form-data"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "Archivo subido con éxito"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RequestPermissions.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /acceptPermissions:
            post:
              summary: "Aceptar permiso a los usuarios Admin"
              consumes:
                - "multipart/form-data"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "Archivo subido con éxito"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AcceptPermissions.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /GetOneOrder:
            get:
              summary: "Recuperrar registros de una sola Orden"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "Recuperrar registros de una sola Orden"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetOneOrder.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /GetRecords:
            get:
              summary: "Detalle de los procesos gestados en la plataforma"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "Detalle de los procesos gestados en la plataforma"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetRecords.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /GetWebhook:
            get:
              summary: "Recuperacion de los detalles de las Ordenes Generadas"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "Recuperacion de los detalles de las Ordenes Generadas"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetWebhook.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /ReSendOrder:
            post:
              summary: "Re-Envio de Ordenes Pendientes o Con falla"
              consumes:
                - "application/json"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "éxito"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReSendOrder.Arn}/invocations"
          /catchOrdersPe:
            post:
              summary: "Catchde b2b orders"
              consumes:
                - "application/json"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "éxito"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CatchOrders.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /createUser:
            post:
              summary: "Creacion de un nuevo usuario"
              produces:
                - "application/json"
              responses:
                "200":
                  description: "agregar usaurio"
                "400":
                  description: "Solicitud incorrecta"
                "500":
                  description: "Error interno del servidor"
              x-amazon-apigateway-integration:
                httpMethod: "POST"
                type: "AWS_PROXY"
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateUser.Arn}/invocations"
                passthroughBehavior: "when_no_match"
          /deleteUser:
            post:
                summary: "eliminar usuario"
                produces:
                  - "application/json"
                responses:
                  "200":
                    description: "eliminar usaurio"
                  "400":
                    description: "Solicitud incorrecta"
                  "500":
                    description: "Error interno del servidor"
                x-amazon-apigateway-integration:
                  httpMethod: "POST"
                  type: "AWS_PROXY"
                  uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteUser.Arn}/invocations"
                  passthroughBehavior: "when_no_match"
                  
          
  # ------------------ API GATEWAY PERMISSIONS -----------
  ApiGatewayInvokeLambdaPermissionOrdersPe:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetOrders
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionUsers:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetUsers
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionUsersGroups:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetUsersGroups
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionRequestPermissions:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref RequestPermissions
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionAcceptPermissions:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref AcceptPermissions
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionGetOneOrder:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetOneOrder
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionGetRecords:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetRecords
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionGetWebhook:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref GetWebhook
      Principal: "apigateway.amazonaws.com"

  ApiGatewayInvokeLambdaPermissionReSendOrder:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref ReSendOrder
      Principal: "apigateway.amazonaws.com"
      
  ApiGatewayInvokeLambdaPermissionCatchOrdersPe:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Ref CatchOrders
      Principal: "apigateway.amazonaws.com"

