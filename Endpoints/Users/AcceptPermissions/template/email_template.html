<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>{{subject_title}}</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); padding: 30px;">
    
    <div style="text-align: center; margin-bottom: 30px;">
      <img src="https://hermesmusicclub.mx/cdn/shop/files/logo-Hermes-music-club_1_black_d3759b35-3330-4e78-826d-472ca8cca610.png?v=1634573448"
           alt="Hermes Music Club Logo"
           style="max-width: 180px;" />
    </div>

    <!-- Título dinámico -->
    <h2 style="text-align: center; color: #D63384; margin-bottom: 20px;">
      {{subject_title}}
    </h2>

    <!-- Cuerpo del mensaje -->
    <p style="font-size: 15px; color: #333333;">
      {{body_message}}
    </p>

    <!-- Firma -->
    <p style="margin-top: 40px; font-size: 14px; color: #666;">
      Saludos,<br />
      <strong>Sistema Hermes</strong>
    </p>
  </div>
</body>
</html>
